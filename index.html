<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anparasan — Profile</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--muted:#98a0b3;--accent:#7c5cff}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;color:#e6eef8;background:linear-gradient(180deg,#061023 0%, #07172a 100%)}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:48px}
    .card{width:100%;max-width:760px;background:rgba(255,255,255,0.03);border-radius:12px;padding:28px;box-shadow:0 10px 30px rgba(2,6,23,0.6);backdrop-filter:blur(6px)}
    .header{display:flex;gap:20px;align-items:center}
    .avatar{width:96px;height:96px;border-radius:999px;border:2px solid rgba(255,255,255,0.06)}
    h1{margin:0;font-size:1.6rem}
    p.lead{color:var(--muted);margin:8px 0 18px}
    .links{display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-block;padding:8px 12px;border-radius:8px;background:linear-gradient(90deg,var(--accent),#5b8bff);color:white;text-decoration:none;font-weight:600}
    footer{margin-top:18px;color:var(--muted);font-size:0.9rem}
    @media (max-width:520px){.header{flex-direction:column;align-items:flex-start}.avatar{width:80px;height:80px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="header">
        <img class="avatar" src="https://github.com/Anparasan3.png" alt="Avatar">
        <div>
          <h1>Anparasan</h1>
          <p class="lead">Software developer — building web apps and tools. Welcome to my GitHub Pages profile.</p>
          <div class="links">
            <a class="btn" href="https://github.com/Anparasan3">GitHub</a>
            <a class="btn" href="https://github.com/Anparasan3/anparasan.github.io">Repo</a>
            <a class="btn" href="mailto:hello@anparasan.dev">Email</a>
          </div>
        </div>
      </div>
      <footer>Hosted with GitHub Pages — URL: https://Anparasan3.github.io</footer>
    </section>
  </main>
</body>
</html>
